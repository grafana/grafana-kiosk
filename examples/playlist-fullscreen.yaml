# Playlist in fullscreen kiosk mode
#
# Chrome flags: --kiosk --start-fullscreen
# Grafana URL:  ?kiosk=1&autofitpanels&inactive=1
# Result:       No top nav, no sidebar, panels autofit, playlist starts immediately
general:
  kiosk-mode: full
  autofit: true
  incognito: true
  hide-links: true
  hide-logo: true
  hide-playlist-nav: true
  hide-time-picker: true
  hide-variables: true

target:
  login-method: anon
  playlist: true
  URL: https://play.grafana.org/playlists/play/aew1xn07xdg5ca
  ignore-certificate-errors: false
