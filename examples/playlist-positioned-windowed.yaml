# Playlist in a fixed-size window on a secondary display
#
# Chrome flags: --app --window-size=960,540 --window-position=300,0
# CDP cycling:  Sets dimensions, stays at requested size
# Grafana URL:  ?kiosk=tv&inactive=1
# Result:       960x540 window on second monitor, playlist starts immediately
general:
  kiosk-mode: tv
  autofit: false
  incognito: true
  window-size: "960,540"
  window-position: "300,0"

target:
  login-method: anon
  playlist: true
  URL: https://play.grafana.org/playlists/play/edn2qdq3ypzwgf
  ignore-certificate-errors: false
